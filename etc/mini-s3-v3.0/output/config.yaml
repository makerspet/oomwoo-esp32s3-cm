#
# Board-specific assignments
#
board:
  manufacturer: makerspet.com
  model: MINI-S3
  version: v3.0.0
lidar:
  gpio:
    tx: 12
    rx: 13
    pwm: 14
    en: 21
led:
  system: 
    gpio: 2
    invert: false
button:
  boot:
    gpio: 0
    invert: true
monitor:
  gpio:
    tx: 43
motor:
  driver:
    type: IN1_IN2
  encoder:
    type: AB_QUAD
  left:
    encoder:
      gpio:
        a: 16
        b: 15
    driver:
      gpio:
        in1: 10
        in2: 11
  right:
    encoder:
      gpio:
        a: 35
        b: 36
    driver:
      gpio:
        in1: 47
        in2: 48
adc:
  battery:
    attenuation: 3.7
    gpio: 4
    voltage:
# 6V motors, 6x AA/D/C (1.2-1.6V) batteries
      full: 9.9
      empty: 7.2

#
# Peripherals configuration
#
lidar:
  model: LDROBOT LD14P
# model: NEATO XV11
# model: SLAMTEC RPLIDAR A1
# model: XIAOMI LDS02RR
# model: YDLIDAR SCL
# model: YDLIDAR X2
# model: YDLIDAR X2L
# model: YDLIDAR X3
# model: YDLIDAR X3 PRO
# model: 3IROBOTIX DELTA-2G
# model: 3IROBOTIX DELTA-2A 115200
# model: 3IROBOTIX DELTA-2A
# model: 3IROBOTIX DELTA-2B
# model: YDLIDAR X4 PRO
# model: YDLIDAR X4
  scan:
    freq:
      target: 5.0
monitor:
  baud: 115200
base:
  wheel:
    track: 0.105043
    diameter: 0.043
    accel:
      max: 2.0
motor:
  rpm:
# derated
    max: 180
  driver:
    pid:
      period: 0.03
      kp: 0.001
      ki: 0.003
      kd: 0
      kpm: 0
  encoder:
    ppr: 1035
  left:
    encoder:
      reverse: true
    driver:
      reverse: true
  right:
    encoder:
      reverse: true
    driver:
      reverse: true
